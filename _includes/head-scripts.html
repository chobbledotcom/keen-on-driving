<script>
  /* Draw the marigold rule under each h2 in as it enters view. Only runs when
     motion is allowed and IntersectionObserver exists; the .k-reveal class it
     sets on <html> is what hides the rules until then (see css/theme.scss). */
  (function () {
    var reduce =
      window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce || !("IntersectionObserver" in window)) return;

    document.documentElement.classList.add("k-reveal");

    var start = function () {
      var io = new IntersectionObserver(
        function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-underlined");
              io.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.35, rootMargin: "0px 0px -8% 0px" },
      );
      document
        .querySelectorAll(".design-system h2")
        .forEach(function (h) {
          io.observe(h);
        });
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", start);
    } else {
      start();
    }
  })();
</script>
